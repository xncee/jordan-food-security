<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Agriculture Types</title>
        <style>
            body {
                font-family: Arial, sans-serif;
            }

            .cards {
                /* display: grid;
                grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); */
                /* gap: 1rem; */
                padding: 1rem;
            }

            .card {
                background: #cae8bd;
                border-radius: 20px;
                box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
                overflow: hidden;
                transition: transform 0.3s ease, box-shadow 0.3s ease;
                padding: 8px;
            }

            .card:hover {
                transform: translateY(-8px);
                box-shadow: 0 12px 25px rgba(0, 0, 0, 0.15);
            }
            .card img {
                width: 100%;
                height: 180px;
                object-fit: cover;
                display: block;
            }
            .card h2 {
                font-size: 1.2rem;
                margin: 0.8rem 1rem 0.5rem;
                color: #2c3e50;
            }

            .card p {
                font-size: 0.9rem;
                margin: 0.3rem 1rem;
                color: #555;
            }

            /* @media (max-width: 480px) {
                .cards {
                    grid-template-columns: 1fr;
                    padding: 1rem;
                }
            } */
        </style>
    </head>
    <body>
        <main id="content">
            <h1>Agriculture types</h1>
            <div
                class="cards grid grid-cols-1 md:grid-cols-3 lg:grid-cols-4 gap-4"
            ></div>
        </main>

        <script type="module">
            import agricultureTypes from "../assets/data/agriculture-types.js";
        </script>
    </body>
</html>
